name: Extra Commit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Print github context
        run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}

      - name: Check sender
        run: |
          if [ "$SENDER" = "deantheking" ]; then
            echo "sender is deantheking"
          else
            echo "sender is not deantheking: $SENDER"
            exit 1
          fi
        env:
          SENDER: ${{ github.event.pull_request.user.login }}

  main:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Create github app token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        run: |
          # git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          # git config --global user.name "${APP_SLUG}[bot]"
          # git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # git config --global user.name "github-actions[bot]"
          git config --global user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git config --global user.name "dependabot[bot]"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf https://github.com/
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_ID: ${{ vars.APP_ID }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: update list
        run: |
          git commit --allow-empty -m "it's me"
          git push